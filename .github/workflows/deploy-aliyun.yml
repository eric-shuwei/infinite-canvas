name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aliyun
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      APP_PORT: ${{ vars.ALIYUN_APP_PORT || '3001' }}
      SSH_HOST: ${{ secrets.ALIYUN_HOST }}
      SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
      SSH_USER: ${{ secrets.ALIYUN_USER }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=aliyun
          cache-to: type=gha,mode=max,scope=aliyun

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.ALIYUN_SSH_KNOWN_HOSTS }}
        run: |
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Actions secret for $name." >&2
              exit 1
            fi
          done

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REVISION: ${{ github.sha }}
        run: |
          cleanup() {
            ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
              -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
              "docker logout ghcr.io >/dev/null 2>&1 || true"
          }
          trap cleanup EXIT

          printf '%s' "$GHCR_TOKEN" | \
            ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
              -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
              "docker login ghcr.io --username '$GHCR_USER' --password-stdin"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "bash -s -- '$IMAGE_NAME:sha-$REVISION' '$APP_PORT' '$REVISION'" \
            < scripts/deploy-aliyun.sh
