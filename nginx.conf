server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/pricing {
        proxy_pass https://token.offerya.cc/api/pricing;
        proxy_ssl_server_name on;
        proxy_set_header Host token.offerya.cc;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
